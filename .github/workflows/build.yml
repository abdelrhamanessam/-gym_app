name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gym_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.0
          channel: stable

      - run: flutter pub get

      - name: Add Firebase plugin to Gradle
        run: |
          sed -i 's/id "com.android.application" version "8.1.0" apply false/id "com.android.application" version "8.1.0" apply false\n    id "com.google.gms.google-services" version "4.4.2" apply false/' android/settings.gradle
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services"/' android/app/build.gradle

      - name: Generate Firebase config
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "167648683505",
              "project_id": "gym-4d6c7",
              "storage_bucket": "gym-4d6c7.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:167648683505:android:placeholder",
                "android_client_info": { "package_name": "com.gym.gym_app" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "placeholder" }],
              "services": { "appinvite_service": { "other_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
JSON
          cat > lib/firebase_options.dart << 'DART'
          import 'package:firebase_core/firebase_core.dart';
          class DefaultFirebaseOptions {
            static const FirebaseOptions currentPlatform = FirebaseOptions(
              apiKey: 'placeholder',
              appId: '1:167648683505:android:placeholder',
              messagingSenderId: '167648683505',
              projectId: 'gym-4d6c7',
              storageBucket: 'gym-4d6c7.appspot.com',
              iosClientId: '',
              iosBundleId: 'com.gym.gym_app',
            );
          }
DART

      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: gym-app-debug-apk
          path: gym_app/build/app/outputs/flutter-apk/*.apk
