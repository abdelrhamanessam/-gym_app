workflows:
  gym-app:
    name: Gym AI App
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FIREBASE_PROJECT_ID: your-firebase-project-id
        FIREBASE_API_KEY: your-firebase-api-key
        FIREBASE_APP_ID: 1:your-app-id:android:your-hash
        FIREBASE_MESSAGING_SENDER_ID: your-sender-id
        FIREBASE_STORAGE_BUCKET: your-project.appspot.com
        FIREBASE_IOS_CLIENT_ID: your-ios-client-id
        FIREBASE_IOS_BUNDLE_ID: com.gym.app
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Create Flutter project structure
        script: |
          cd gym_app
          rm -rf android ios
          flutter create --project-name gym_app --org com.gym --platforms android .
          flutter pub get
      - name: Add Firebase plugins to Gradle
        script: |
          cd gym_app/android
          if [ -f build.gradle.kts ]; then
            perl -i -pe 's/plugins {/plugins {\n    id("com.google.gms.google-services") version "4.4.2" apply false/' build.gradle.kts
            perl -i -pe 's/plugins {/plugins {\n    id("com.google.gms.google-services")/' app/build.gradle.kts
          else
            perl -i -pe "s/dependencies {/dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'/" build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> app/build.gradle
          fi
      - name: Generate firebase_options.dart
        script: |
          cd gym_app
          cat > lib/firebase_options.dart << EOF
          import 'package:firebase_core/firebase_core.dart';

          class DefaultFirebaseOptions {
            static const FirebaseOptions currentPlatform = FirebaseOptions(
              apiKey: '${FIREBASE_API_KEY}',
              appId: '${FIREBASE_APP_ID}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              projectId: '${FIREBASE_PROJECT_ID}',
              storageBucket: '${FIREBASE_STORAGE_BUCKET}',
              iosClientId: '${FIREBASE_IOS_CLIENT_ID}',
              iosBundleId: '${FIREBASE_IOS_BUNDLE_ID}',
            );
          }
          EOF
      - name: Add Firebase Android config
        script: |
          cd gym_app
          cat > android/app/google-services.json << EOF
          {
            "project_info": {
              "project_number": "${FIREBASE_MESSAGING_SENDER_ID}",
              "project_id": "${FIREBASE_PROJECT_ID}",
              "storage_bucket": "${FIREBASE_STORAGE_BUCKET}"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "${FIREBASE_APP_ID}",
                  "android_client_info": {
                    "package_name": "com.gym.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${FIREBASE_API_KEY}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
      - name: Get packages
        script: cd gym_app && flutter pub get
      - name: Generate code
        script: cd gym_app && dart run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: cd gym_app && flutter build apk --release
    artifacts:
      - gym_app/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@gmail.com
